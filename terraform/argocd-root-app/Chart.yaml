# Chart.yaml — Helm's metadata file. Every Helm chart needs one.
#
# WHAT IS A HELM CHART?
# A "chart" is a folder of Kubernetes YAML templates packaged together so they
# can be installed as a unit. Normally a chart contains many templates (a whole
# app: Deployment + Service + Ingress + ConfigMap + ...) and a `values.yaml`
# file letting users customize the install (replicas, image tag, etc.).
#
# OUR chart is a one-trick pony: it has a SINGLE template — the Argo CD root
# Application — and no customizable values. The whole point of wrapping it as
# a chart is that Tofu's Helm plugin (the only Kubernetes-aware plugin we have
# installed in providers.tf) only knows how to install *charts*. So we put our
# one YAML in chart clothing. ~30 seconds of scaffolding to avoid adding a new
# plugin we'd then have to maintain for 10 years.
#
# This file's job is to satisfy Helm's "is this a valid chart?" sanity check.
# Without it, `helm install` (and therefore Tofu's helm_release) refuses to
# touch the folder.

apiVersion: v2
# Helm chart format version. v2 = Helm 3 (current). v1 was Helm 2, which is
# end-of-life. Always v2 for anything written today.

name: argocd-root-app
# Chart identifier. Used by Helm internally and shown if you ever run
# `helm list`. Doesn't have to match the folder name but conventionally does.

description: Bootstrap chart whose only template is the Argo CD root Application.
# Free-text. Shown by `helm show chart` and similar. Educational only.

type: application
# Two valid values:
#   - "application" → installs workloads (this is us).
#   - "library"     → reusable templates other charts pull from, never
#                     installed on its own. Not what we want.

version: 0.1.0
# The CHART version (this folder's version, not "the version of the thing
# inside"). Bump this when YOU change the chart's contents. Helm uses
# semver here.

appVersion: "1.0.0"
# The version of the APP the chart installs. For a normal chart like
# cert-manager, this would be the cert-manager release (e.g. "v1.20.2").
# Our chart doesn't install an "app" — it installs one config resource —
# so this field is required-but-meaningless. Pick any placeholder and
# forget it exists.
