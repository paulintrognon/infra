# Ansible defaults for this project.
# Picked up automatically when you run ansible/ansible-playbook from this directory.

[defaults]
inventory          = inventory.yml
stdout_callback    = default
result_format      = yaml
nocows             = True
host_key_checking  = True
gathering          = smart
forks              = 10

[ssh_connection]
pipelining = True

# A playbook is just many small tasks; each task normally opens its own SSH
# connection to the VPS, runs, and disconnects. The handshake (TCP + key
# exchange) costs ~0.5–1s per task, which adds up to minutes over a full
# bootstrap.
#
# ControlMaster=auto tells SSH: "open ONE connection on the first task, then
# tunnel every subsequent task through that same already-open connection."
# ControlPersist=60s keeps that shared connection alive for 60s after the
# playbook finishes, so if you re-run the playbook within a minute you hit
# the still-warm connection and start instantly.
# -C is gzip compression on the SSH stream (cheap win on slow links).
#
# These three flags are also Ansible's BUILT-IN defaults — we set them
# explicitly so anyone reading this file can see what's happening rather than
# wondering why re-runs are fast.
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s
