# Strips the literal `www.` prefix from any host with a 301 Permanent Redirect,
# preserving path and query. Companion to helmchartconfig.yaml (which handles
# the http→https hop).
#
# Opt-in per Ingress — only fires on routers that reference it via the
# `traefik.ingress.kubernetes.io/router.middlewares` annotation. Apps that
# want `www.` as canonical, or that serve other subdomains, simply don't
# attach it.
#
# For a request to `http://www.foo.com/bar`, the full chain is:
#   :80  → 301 → https://www.foo.com/bar   (helmchartconfig redirect)
#   :443 → 301 → https://foo.com/bar       (this middleware)
#   :443 → app                              (apex Ingress backend)
# Three hops worst case, but browsers cache 301s, so a returning visitor
# usually pays them only once.
#  
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: www-to-apex

  # Every k8s resource lives in a namespace (a logical group of related
  # resources). Traefik itself was installed by k3s into `kube-system`, so by
  # convention we put this Middleware there too — keeps Traefik plumbing
  # together. The apps that will use it live in `default`. That's fine, but
  # the Ingress annotation must spell out the full address with this format:
  # `<middleware-namespace>-<middleware-name>@kubernetescrd`. So our apps
  # will reference it as `kube-system-www-to-apex@kubernetescrd`.
  namespace: kube-system
spec:
  redirectRegex:
    regex: '^https?://www\.(.*)'
    replacement: 'https://${1}'
    permanent: true
