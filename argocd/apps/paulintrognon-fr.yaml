# Argo CD Application — paulintrognon.fr.
#
# Discovered and applied by the root Application (terraform/argocd-root-app),
# which watches argocd/apps/ in this repo and creates/updates every
# Application CR it finds.

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: paulintrognon-fr
  # Application names follow Kubernetes resource-name rules: lowercase
  # alphanumeric and hyphens, NO dots. So the domain `paulintrognon.fr`
  # becomes `paulintrognon-fr`. This also matches the Deployment / Service /
  # Ingress names in k8s/apps/paulintrognon.fr/.

  namespace: argocd
  # Application CRs live in `argocd` — Argo CD's controller watches its
  # own namespace for them by default. This is NOT where the workload
  # runs; that's `spec.destination.namespace` below.

spec:
  project: default
  # Argo CD's built-in catch-all Project. Projects group Applications and
  # scope what each can do (which repos can be sourced from, which namespaces
  # can be deployed to, etc.). `default` allows everything — fine for a
  # single-tenant cluster.

  source:
    repoURL: https://github.com/paulintrognon/infra.git
    targetRevision: main
    path: k8s/apps/paulintrognon.fr
    # The literal `.` in the folder name is fine — `spec.source.path` is a
    # filesystem path within the repo, not a Kubernetes resource name, so
    # it accepts any character a filesystem does.

  destination:
    server: https://kubernetes.default.svc
    # "This cluster." The in-cluster Kubernetes API address.

    namespace: default
    # The namespace the workload's resources run in. Manifests at
    # `source.path` that don't declare their own `metadata.namespace` get
    # this value injected into them as Argo CD applies them; manifests that
    # DO declare a namespace keep it. This field only fills in the blanks.

  # `syncPolicy` is omitted, so this Application is MANUAL: Argo CD detects
  # drift and reports `OutOfSync`, but won't touch the cluster until a sync
  # is triggered explicitly (via `argocd app sync` or the UI). To enable
  # automated GitOps, add:
  #
  #   syncPolicy:
  #     automated:
  #       prune: true       # delete cluster resources when their YAML is removed
  #       selfHeal: true    # revert hand-edits to match git
